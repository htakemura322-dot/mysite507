    - data:
        code: "import json\nimport re\n\ndef main(file_results: list, check_result:\
          \ str) -> dict:\n    def clean_json(text):\n        if not text or not text.strip():\n\
          \            return \"{}\"\n        text = text.strip()\n        text =\
          \ re.sub(r'^```json\\s*', '', text)\n        text = re.sub(r'^```\\s*',\
          \ '', text)\n        text = re.sub(r'\\s*```$', '', text)\n        return\
          \ text.strip()\n\n    files = []\n    for f in file_results:\n        if\
          \ isinstance(f, str) and f.strip():\n            try:\n                files.append(json.loads(clean_json(f)))\n\
          \            except json.JSONDecodeError:\n                files.append({\"\
          original_filename\": \"parse_error\", \"error\": f[:100]})\n        elif\
          \ isinstance(f, dict):\n            files.append(f)\n\n    checks = {\"\
          files\": []}\n    if isinstance(check_result, str) and check_result.strip():\n\
          \        try:\n            checks = json.loads(clean_json(check_result))\n\
          \        except json.JSONDecodeError:\n            checks = {\"files\":\
          \ [], \"parse_error\": check_result[:200]}\n    elif isinstance(check_result,\
          \ dict):\n        checks = check_result\n\n    total_files = len(files)\n\
          \    check_files = checks.get(\"files\", [])\n\n    ok_count = sum(1 for\
          \ f in check_files if f.get(\"overall\") == \"適合\")\n    ng_count = sum(1\
          \ for f in check_files if f.get(\"overall\") == \"不備あり\")\n    pending_count\
          \ = total_files - ok_count - ng_count\n    compliance_rate = round((ok_count\
          \ / total_files) * 100, 1) if total_files > 0 else 0\n\n    ng_files = []\n\
          \    for f in check_files:\n        if f.get(\"overall\") != \"適合\":\n \
          \           ng_files.append({\n                \"filename\": f.get(\"filename\"\
          , \"\"),\n                \"status\": f.get(\"overall\", \"\"),\n      \
          \          \"issues\": f.get(\"issues\", []),\n                \"recommendations\"\
          : f.get(\"recommendations\", [])\n            })\n\n    has_issues = len(ng_files)\
          \ > 0\n\n    csv_header = \"No,元ファイル名,新ファイル名,取引日,取引先,金額,種別,判定\"\n    csv_rows\
          \ = [csv_header]\n    for i, meta in enumerate(files):\n        status =\
          \ \"適合\"\n        for cf in check_files:\n            if cf.get(\"filename\"\
          ) == meta.get(\"original_filename\"):\n                status = cf.get(\"\
          overall\", \"適合\")\n                break\n        row = f'{i+1},{meta.get(\"\
          original_filename\",\"\")},{meta.get(\"new_filename\",\"\")},{meta.get(\"\
