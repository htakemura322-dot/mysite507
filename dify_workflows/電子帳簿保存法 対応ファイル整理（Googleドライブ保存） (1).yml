    - data:
        code: "import json\nimport re\nfrom datetime import datetime\n\ndef main(trade_date:\
          \ str, partner_name: str, amount: int,\n         doc_type: str, description:\
          \ str, original_filename: str,\n         save_folder: str, input_trade_date:\
          \ str) -> dict:\n\n    final_date = input_trade_date if input_trade_date\
          \ else trade_date\n    date_compact = final_date.replace(\"-\", \"\")\n\n\
          \    safe_partner = re.sub(r'[株式会社(有)(株)　\\s]', '', partner_name)\n    safe_partner\
          \ = safe_partner[:10]\n\n    type_map = {\n        \"請求書\": \"INV\",\n \
          \       \"領収書\": \"RCP\",\n        \"注文書\": \"ORD\",\n        \"契約書\": \"\
          CTR\",\n        \"その他\": \"OTH\"\n    }\n    type_code = type_map.get(doc_type,\
          \ \"OTH\")\n\n    ext = original_filename.rsplit(\".\", 1)[-1] if \".\"\
          \ in original_filename else \"pdf\"\n\n    new_filename = f\"{date_compact}_{safe_partner}_{amount}_{type_code}.{ext}\"\
          \n\n    safe_folder = save_folder if save_folder else \"\"\n    full_path\
          \ = f\"{safe_folder.rstrip('/')}/{new_filename}\" if safe_folder else new_filename\n\
          \n    metadata = {\n        \"original_filename\": original_filename,\n\
          \        \"new_filename\": new_filename,\n        \"full_path\": full_path,\n\
          \        \"trade_date\": final_date,\n        \"partner_name\": partner_name,\n\
          \        \"amount\": amount,\n        \"doc_type\": doc_type,\n        \"\
          description\": description,\n        \"processed_at\": datetime.now().strftime(\"\
          %Y-%m-%d %H:%M:%S\"),\n        \"search_keys\": {\n            \"date_range\"\
          : final_date,\n            \"partner\": partner_name,\n            \"amount_range\"\
          : amount,\n            \"type\": doc_type\n        }\n    }\n\n    return\
          \ {\n        \"new_filename\": new_filename,\n        \"full_path\": full_path,\n\
          \        \"metadata_json\": json.dumps(metadata, ensure_ascii=False)\n \
          \   }\n"
