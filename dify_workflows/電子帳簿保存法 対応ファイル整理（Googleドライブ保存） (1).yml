        prompt_template:
        - id: 2d92a45d-fefc-40d9-b388-e2acae79eeec
          role: system
          text: "あなたは電子帳簿保存法の専門家です。\n電子取引データの保存要件への適合性を厳密にチェックしてください。\n\n電帳法保存要件検索\n\
            {{#context#}}\n\n以下の3つの観点で各ファイルを評価し、JSON形式で結果を返してください。\n\n【評価観点】\n1. 真実性の要件\n\
            2. 可視性の要件\n3. 検索性の要件\n\n※注意：出力トークン数を抑えるため、個別のチェック項目の詳細（checksリスト）は出力しないでください。最終的な判定結果と問題点のみを出力してください。\n\
            \n【出力JSON形式】\n{\n  \"files\": [\n    {\n      \"filename\": \"元ファイル名\"\
            ,\n      \"overall\": \"適合/不備あり/要確認\",\n      \"issues\": [\"不備内容の短いリスト(適合の場合は空のリスト\
            \ [])\"],\n      \"recommendations\": [\"推奨対応のテキスト(適合の場合は空のリスト [])\"]\n\
            \    }\n  ]\n}\n"
        - id: 7d70c654-9049-44f6-aee0-b890456c4913
          role: user
          text: "    以下の電子取引ファイルについて、電帳法保存要件のチェックを実施してください。\n\n    【処理済みファイル情報】\n\
            \    {{#1772502740789.output#}}\n\n     【指定保存先】\n    {{#1772502443849.save_folder#}}\n\
            \n    各ファイルについて、真実性・可視性・検索性の全項目をチェックし、\n    不備がある場合は具体的な修正手順も含めて報告してください。"
        selected: false
        title: LLM（ 保存要件充足判定）
        type: llm
        vision:
          enabled: false
      height: 87
      id: '1772701350979'
      position:
        x: 2042.0965291375214
